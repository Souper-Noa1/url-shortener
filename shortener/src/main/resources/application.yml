
spring:
  application:
    name: urlshortener


  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration


app:
  base-url: http://localhost:8080
  short-code-length: 6
  default-expiry-days: 30
  jwt:
    secret: "idkwhattowritelol"
    expiration-ms: 86400000    # 24 hours


management:
  endpoints:
    web:
      base-path: /internal/actuator
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

---

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/snaplink_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

logging:
  level:
    com.url: DEBUG
    org.hibernate.SQL: DEBUG

---

spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:url_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    dbcp2:
      driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.url: INFO

---

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

app:
  base-url: ${APP_BASE_URL}
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    com.url: INFO
    root: WARN
